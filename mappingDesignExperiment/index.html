<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>

    <script src="https://unpkg.com/konva@10/konva.min.js"></script>

    <link rel="stylesheet" href="../reset.css">
    <link rel="stylesheet" href="mappingStyle.css">
    <script src="mappingMain.js" defer></script>
</head>
<body>

<main>
    <div class="toolbar">
        <button id="circle-button">draw a new circle</button>
        <fieldset>
            <legend>pick a new circle colour:</legend>

            <div>
                <!--Subtle cool cyan for delicate, airy accents without overwhelming the composition-->
                <input type="radio" id="change-lightcyan" name="colourSelect" value="lightcyan" checked />
                <label for="change-lightcyan">LightCyan</label>
            </div>

            <div>
                <!--Balanced muted blue as a visually stable core color for clear readability-->
                <input type="radio" id="change-lightblue" name="colourSelect" value="lightblue" />
                <label for="change-lightblue">LightBlue</label>
            </div>

            <div>
                <!--Bright sky-blue to add energetic contrast and highlight interactive elements playfully-->
                <input type="radio" id="change-lightskyblue" name="colourSelect" value="lightskyblue" />
                <label for="change-lightskyblue">LightSkyblue</label>
            </div>
        </fieldset>

    </div>
    <div class="stageContainer" id="stage-container">
         <div id="konva-stage"></div>
    </div>
</main>

</body>
</html>
